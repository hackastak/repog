name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Lint, Typecheck & Test
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22.x]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Rebuild native dependencies
        run: |
          pnpm rebuild better-sqlite3
          pnpm rebuild keytar

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test with coverage
        run: pnpm --filter @repog/core test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: packages/core/coverage/
          retention-days: 7

  release-check:
    name: Release Readiness Check
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Rebuild native dependencies
        run: |
          pnpm rebuild better-sqlite3
          pnpm rebuild keytar

      - name: Build
        run: pnpm --filter repog build

      - name: Verify shebang
        run: |
          head -1 packages/cli/dist/index.js | grep -q "#!/usr/bin/env node" \
            && echo "✓ Shebang present" \
            || (echo "✗ Shebang missing" && exit 1)

      - name: Verify native modules not bundled
        run: |
          if grep -q "node_modules/better-sqlite3\|node_modules/keytar\|node_modules/sqlite-vec" packages/cli/dist/index.js; then
            echo "✗ Native modules found in bundle"
            exit 1
          else
            echo "✓ Native modules not bundled"
          fi

      - name: Dry run pack
        run: cd packages/cli && npm pack --dry-run
