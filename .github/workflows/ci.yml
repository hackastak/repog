name: CI
on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        go: ['1.22']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y gcc libsqlite3-dev
      - name: Build
        run: go build ./...
      - name: Test
        run: |
          # Test all packages with -race, but only collect coverage from packages with tests
          # This avoids the covdata error on macOS for packages without test files
          go test -race ./...
          # Collect coverage separately from packages with tests only
          go test -coverprofile=coverage.out ./internal/ask ./internal/config ./internal/db ./internal/embed \
            ./internal/format ./internal/gemini ./internal/github ./internal/provider \
            ./internal/recommend ./internal/search ./internal/summarize ./internal/sync
      - name: Coverage check
        run: |
          go tool cover -func=coverage.out | grep total | \
          awk '{gsub(/%/,"",$3); if ($3 < 50) {print "Coverage below 50%: " $3"%"; exit 1}}'

  release:
    name: Release
    needs: test
    runs-on: macos-latest
    if: startsWith(github.ref, 'refs/tags/v') && !failure() && !cancelled()
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
