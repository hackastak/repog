version: "2"

linters:
  enable:
    - govet
    - errcheck
    - staticcheck
    - unused
    - ineffassign
    - misspell
    - unconvert
    - unparam
    - prealloc

formatters:
  enable:
    - gofmt
    - goimports

formatters-settings:
  goimports:
    local-prefixes:
      - github.com/hackastak/repog

linters-settings:
  errcheck:
    check-blank: true
    check-type-assertions: true

run:
  timeout: 5m

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
