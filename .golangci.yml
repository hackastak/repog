linters:
  enable:
    - gofmt
    - govet
    - errcheck
    - staticcheck
    - unused
    - ineffassign
    - gosimple
    - typecheck
    - goimports
    - misspell
    - unconvert
    - unparam
    - prealloc

linters-settings:
  goimports:
    local-prefixes: github.com/hackastak/repog

  errcheck:
    check-blank: true
    check-type-assertions: true

run:
  timeout: 5m
  skip-dirs:
    - vendor
    - .git

issues:
  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0
